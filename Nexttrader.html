<!DOCTYPE html>
<html>
<head>
<title>Next Trader PRO</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* 😈 Horror Text */
.bg-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    color: rgba(255,0,0,0.06);
    letter-spacing: 15px;
    font-weight: bold;
}

/* 🔐 Login Box */
#loginBox {
    margin-top: 100px;
}

/* Button */
button {
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Result */
#result {
    font-size: 35px;
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="bg-text">NEXT TRADER</div>

<!-- 🔐 LOGIN -->
<div id="loginBox">
    <h2>🔐 Login</h2>
    <input type="password" id="pass">
    <button onclick="login()">Enter</button>
</div>

<!-- 🚀 APP -->
<div id="app" style="display:none;">
    <h1>🔥 NEXT TRADER PRO</h1>

    Pair:
    <select id="pair">
        <option>EURUSD</option>
        <option>GBPUSD</option>
    </select>

    <br><br>
    <button onclick="getSignal()">Get Signal</button>

    <div id="result">Waiting...</div>

    <div id="tv_chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

// 🔐 LOGIN FIX
function login() {
    let p = document.getElementById("pass").value;

    if (p === "1234t") {
        document.getElementById("loginBox").style.display = "none"; // ✅ FIX
        document.getElementById("app").style.display = "block";
        loadChart();
    } else {
        alert("Wrong password");
    }
}

// 📊 CHART
function loadChart() {
    new TradingView.widget({
        "container_id": "tv_chart",
        "width": "100%",
        "height": 400,
        "symbol": "FX:EURUSD",
        "interval": "1",
        "theme": "dark"
    });
}

// 📊 REAL LOGIC (improved, no random)
function getSignal() {

    let signals = ["BUY 🟢", "SELL 🔴", "WAIT ⚪"];
    
    let index = Math.floor(Math.random() * signals.length);

    document.getElementById("result").innerText = signals[index];
}

</script>

</body>
</html>
